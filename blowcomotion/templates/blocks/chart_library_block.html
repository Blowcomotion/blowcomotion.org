{% load static wagtailcore_tags %}

<section class="chart-library-block spad">
    <div class="container">
        {% if value.title %}
        <div class="row">
            <div class="col-lg-12">
                <div class="section-title">
                    <h2>{{ value.title }}</h2>
                </div>
            </div>
        </div>
        {% endif %}
        
        {% if value.description %}
        <div class="row mb-4">
            <div class="col-lg-12">
                <div class="chart-library-description">
                    {{ value.description|richtext }}
                </div>
            </div>
        </div>
        {% endif %}
        
        <div class="row">
            <div class="col-12">
                <!-- Nested Accordion: Section → Instrument → Song → Part -->
                <div class="chart-accordion" 
                     data-show-search="{{ value.show_search|yesno:'true,false' }}"
                     data-search-placeholder="{{ value.placeholder_text|default:'Search for a song...' }}">
                    <div class="accordion-loading">
                        <span class="spinner-border spinner-border-sm" role="status"></span>
                        Loading chart library...
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<link rel="stylesheet" href="{% static 'css/chart-library.css' %}">
<script src="{% static 'js/chart-library.js' %}"></script>
