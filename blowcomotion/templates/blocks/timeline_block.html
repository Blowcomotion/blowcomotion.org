{% load wagtailcore_tags wagtailimages_tags %}
<section style="background-color: {{ value.background_color|default:'#F0F2F5' }};">
  <div class="container-fluid py-5">
    <div class="main-timeline-2">
      {% for item in value.timeline_items %}
      <div class="timeline-2 {% if forloop.counter|divisibleby:2 %}right-2{% else %}left-2{% endif %}">
        <div class="card">
          {% if item.image %}
            <div class="cursor-pointer" data-toggle="collapse" data-target="#collapse-{{ value.id }}-{{ forloop.counter }}" aria-expanded="{% if forloop.first %}true{% else %}false{% endif %}" aria-controls="collapse-{{ value.id }}-{{ forloop.counter }}" style="cursor: pointer;">
              {% image item.image original class="card-img-top img-fluid" %}
            </div>
          {% endif %}
          <div class="card-header p-0 border-0">
            <button class="btn btn-link w-100 text-left text-decoration-none text-dark p-4" type="button" data-toggle="collapse" data-target="#collapse-{{ value.id }}-{{ forloop.counter }}" aria-expanded="{% if forloop.first %}true{% else %}false{% endif %}" aria-controls="collapse-{{ value.id }}-{{ forloop.counter }}">
              <h4 class="font-weight-bold mb-2">{{ item.title }}</h4>
              {% if item.date %}
                <p class="text-muted mb-0"><i class="far fa-clock" aria-hidden="true"></i> {{ item.date }}</p>
              {% endif %}
            </button>
          </div>
          <div id="collapse-{{ value.id }}-{{ forloop.counter }}" class="collapse {% if forloop.first %}show{% endif %}">
            <div class="card-body p-4 pt-0">
              <div class="mb-0">{{ item.description|richtext }}</div>
            </div>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
