<script>
(function () {
    function initRow(row) {
        var checkBtn = row.querySelector('.secondary-design-check-btn');
        var xBtn = row.querySelector('.secondary-design-x-btn');
        if (!checkBtn || !xBtn) return;
        var checkIcon = checkBtn.querySelector('i');
        var xIcon = xBtn.querySelector('i');
        // At most one of the two can be selected at a time; null means neither is.
        var selected = null;

        function render() {
            var checkSelected = selected === 'check';
            checkBtn.style.backgroundColor = checkSelected ? '#5b1a76' : '#fff';
            checkBtn.style.borderColor = checkSelected ? '#5b1a76' : '#dee2e6';
            checkIcon.style.color = checkSelected ? '#fff' : '#212529';

            // The X button turns white whenever the check button is selected;
            // otherwise it's red by default, whether or not it's been clicked itself.
            if (checkSelected) {
                xBtn.style.backgroundColor = '#fff';
                xBtn.style.borderColor = '#dee2e6';
                xIcon.style.color = '#adb5bd';
            } else {
                xBtn.style.backgroundColor = '#dc3545';
                xBtn.style.borderColor = '#dc3545';
                xIcon.style.color = '#fff';
            }
        }

        checkBtn.addEventListener('click', function () {
            selected = selected === 'check' ? null : 'check';
            render();
        });

        xBtn.addEventListener('click', function () {
            selected = selected === 'x' ? null : 'x';
            render();
        });

        render();
    }

    document.querySelectorAll('.secondary-design-row').forEach(initRow);
})();
</script>
