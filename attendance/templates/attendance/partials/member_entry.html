{% load wagtailimages_tags static %}
<div class="col-6 col-md-4 col-lg-3 mb-3">
    <label class="attendance-member-card d-block h-100 m-0" for="member_{{ entry.member.id }}">
        <span class="attendance-member-card__checkbox-wrap">
            <input class="attendance-member-card__input" type="checkbox"
                   id="member_{{ entry.member.id }}" name="member_{{ entry.member.id }}">
        </span>

        <span class="attendance-member-card__body">
            {% if entry.member.id in recorded_member_ids %}
                <span class="attendance-member-card__recorded-tag">
                    <i class="fa fa-check" aria-hidden="true"></i> Recorded
                </span>
            {% endif %}

            <span class="attendance-member-card__photo">
                {% if entry.member.image %}
                    {% image entry.member.image fill-320x320 as member_photo %}
                    <img src="{{ member_photo.url }}" alt="" loading="lazy">
                {% else %}
                    <img src="{% static 'attendance/img/default-member.png' %}" alt="" loading="lazy">
                {% endif %}
            </span>

            <span class="attendance-member-card__name-wrap">
                <span class="attendance-member-card__name">{{ entry.member }}</span>
            </span>

            {% if entry.is_additional_for_section %}
                <span class="badge bg-warning text-dark attendance-member-card__badge">Additional</span>
            {% endif %}
        </span>
    </label>
</div>
